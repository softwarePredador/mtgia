map $uri $manaloom_app_cache_control {
  # Flutter keeps several runtime filenames stable across releases. They must
  # revalidate so a browser with a warm cache cannot keep an old application
  # shell after a deploy.
  default "public, max-age=3600, must-revalidate";
  "/healthz" "no-cache, no-store, must-revalidate";
  "/app/index.html" "no-cache, no-store, must-revalidate";
  "/app/release.json" "no-cache, no-store, must-revalidate";
  "/app/flutter_service_worker.js" "no-cache, no-store, must-revalidate";
  "/app/flutter_bootstrap.js" "no-cache, must-revalidate";
  "/app/flutter.js" "no-cache, must-revalidate";
  "/app/main.dart.js" "no-cache, must-revalidate";
  "/app/manifest.json" "no-cache, must-revalidate";
  "/app/assets/AssetManifest.bin" "no-cache, must-revalidate";
  "/app/assets/AssetManifest.bin.json" "no-cache, must-revalidate";
  "/app/assets/FontManifest.json" "no-cache, must-revalidate";
  # Lotus uses stable filenames (index.html, app.min.js, styles.min.css). A
  # conditional revalidation prevents a mixed old/new life-counter runtime.
  ~*^/app/assets/assets/lotus/ "no-cache, must-revalidate";
  # Only content-addressed files are immutable. Other Flutter/Lotus assets are
  # intentionally short-lived because their public filenames are not hashed.
  "~*^/app/.*[.-][0-9a-f]{8,}\.(?:avif|css|gif|ico|jpe?g|js|json|png|svg|ttf|wasm|webp|woff2?)$" "public, max-age=31536000, immutable";
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  include /etc/nginx/mime.types;

  gzip on;
  gzip_types application/javascript application/json application/wasm image/svg+xml text/css text/plain;

  add_header Cache-Control "$manaloom_app_cache_control" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'self' blob: data:; manifest-src 'self'; media-src 'self' blob: data:; upgrade-insecure-requests" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Permitted-Cross-Domain-Policies "none" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /app {
    return 308 /app/;
  }

  location = /app/index.html {
    try_files $uri =404;
  }

  location = /app/release.json {
    default_type application/json;
    try_files $uri =404;
  }

  location = /app/flutter_service_worker.js {
    try_files $uri =404;
  }

  location ~* ^/app/.*\.(?:avif|css|gif|ico|jpe?g|js|json|png|svg|ttf|wasm|webp|woff2?)$ {
    try_files $uri =404;
  }

  location /app/ {
    try_files $uri $uri/ /app/index.html;
  }

  location / {
    return 404;
  }
}
