map $uri $manaloom_app_cache_control {
  default "no-cache";
  "/app/index.html" "no-cache, no-store, must-revalidate";
  "/app/flutter_service_worker.js" "no-cache, no-store, must-revalidate";
  ~*^/app/.*\.(?:avif|css|gif|ico|jpe?g|js|json|png|svg|ttf|wasm|webp|woff2?)$ "public, max-age=31536000, immutable";
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  include /etc/nginx/mime.types;

  gzip on;
  gzip_types application/javascript application/json application/wasm image/svg+xml text/css text/plain;

  add_header Cache-Control "$manaloom_app_cache_control" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /app {
    return 308 /app/;
  }

  location = /app/index.html {
    try_files $uri =404;
  }

  location = /app/flutter_service_worker.js {
    try_files $uri =404;
  }

  location ~* ^/app/.*\.(?:avif|css|gif|ico|jpe?g|js|json|png|svg|ttf|wasm|webp|woff2?)$ {
    try_files $uri =404;
  }

  location /app/ {
    try_files $uri $uri/ /app/index.html;
  }

  location / {
    return 404;
  }
}
