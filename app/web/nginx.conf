server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  include /etc/nginx/mime.types;

  gzip on;
  gzip_types application/javascript application/json application/wasm image/svg+xml text/css text/plain;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /app {
    return 308 /app/;
  }

  location = /app/index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  location = /app/flutter_service_worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  location ~* ^/app/.*\.(?:avif|css|gif|ico|jpe?g|js|json|png|svg|ttf|wasm|webp|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /app/ {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /app/index.html;
  }

  location / {
    return 404;
  }
}
