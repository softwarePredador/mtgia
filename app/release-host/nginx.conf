map $uri $manaloom_release_cache_control {
  default "no-cache";
  "/healthz" "no-cache, no-store, must-revalidate";
  "/downloads/release.json" "no-cache, no-store, must-revalidate";
  "/downloads/manaloom-android.apk" "no-cache, no-store, must-revalidate";
  "/downloads/SHA256SUMS" "no-cache, no-store, must-revalidate";
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  include /etc/nginx/mime.types;
  types { application/vnd.android.package-archive apk; }

  add_header Cache-Control "$manaloom_release_cache_control" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /downloads {
    return 308 /downloads/;
  }

  location = /downloads/release.json {
    try_files $uri =404;
  }

  location /downloads/ {
    try_files $uri =404;
  }

  location / {
    return 404;
  }
}
