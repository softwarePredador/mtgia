name: server
description: An HTTP server for the MTG Deck Builder.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  dart_frog: ^1.0.0
  postgres: ^3.0.0
  dotenv: ^4.0.0
  http: ^1.2.1
  bcrypt: ^1.1.3
  crypto: ^3.0.6
  dart_jsonwebtoken: ^2.12.0
  html: ^0.15.6
  sentry: ^9.15.0
  meta: ^1.18.3
  path: ^1.9.1

dev_dependencies:
  dart_frog_cli: 1.2.14
  test: ^1.14.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  dependency_validator: ^3.2.3
  custom_lint: ^0.8.1
  manaloom_lints:
    path: ../tools/manaloom_lints
